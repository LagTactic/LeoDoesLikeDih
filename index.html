<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yllx - Web Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-secondary: #101825;
      --fg: #ffffff;
      --muted: #8892a6;
      --accent: #3b82f6; /* Blue */
      --accent-hover: #2563eb;
      --accent-light: #60a5fa;
      --border: #1e293b;
      --card: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Browser Chrome */
    .navbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      z-index: 100;
    }

    .brand {
      font-weight: 700;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-right: 10px;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s;
    }

    .nav-btn:hover {
      background: var(--border);
      color: var(--fg);
    }

    .url-bar-container {
      flex: 1;
      position: relative;
    }

    .url-bar {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 20px;
      color: var(--fg);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-bar:focus {
      border-color: var(--accent);
    }

    .go-btn {
      background: var(--accent);
      border: none;
      padding: 10px 24px;
      border-radius: 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .go-btn:hover { background: var(--accent-hover); }
    .go-btn:active { transform: scale(0.98); }

    /* Content Area */
    .content-area {
      flex: 1;
      position: relative;
      background: #ffffff;
    }

    .proxy-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Welcome Screen */
    .welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg) 0%, #0f172a 100%);
      color: var(--fg);
      text-align: center;
      padding: 20px;
    }

    .welcome-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
    }

    .welcome h1 { 
      font-size: 32px; 
      margin-bottom: 12px; 
      background: linear-gradient(to right, var(--fg), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .welcome p { 
      color: var(--muted); 
      margin-bottom: 32px; 
      max-width: 400px; 
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }

    .shortcut {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 10px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .shortcut:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.1);
    }

    .shortcut-icon { font-size: 24px; margin-bottom: 8px; display: block; }
    .shortcut-name { font-size: 12px; color: var(--muted); }

    /* Loading Spinner */
    .loader {
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 26, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    
    .spinner {
      border: 4px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="brand">Yllx</div>
    
    <button class="nav-btn" id="backBtn" title="Back">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <button class="nav-btn" id="forwardBtn" title="Forward">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div class="url-bar-container">
      <input type="text" class="url-bar" id="urlInput" placeholder="Search YouTube or enter URL..." autocomplete="off">
    </div>

    <button class="go-btn" id="goBtn">Go</button>
  </div>

  <!-- Content Area -->
  <div class="content-area">
    <!-- Loading Spinner -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <!-- Welcome Screen -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-logo">Y</div>
      <h1>Browse Freely</h1>
      <p>Access YouTube, TikTok, and more with our advanced proxy.</p>
      
      <div class="shortcuts">
        <div class="shortcut" data-url="https://www.youtube.com">
          <span class="shortcut-icon">▶️</span>
          <span class="shortcut-name">YouTube</span>
        </div>
        <div class="shortcut" data-url="https://www.tiktok.com">
          <span class="shortcut-icon">🎵</span>
          <span class="shortcut-name">TikTok</span>
        </div>
        <div class="shortcut" data-url="https://www.google.com">
          <span class="shortcut-icon">G</span>
          <span class="shortcut-name">Google</span>
        </div>
      </div>
    </div>

    <!-- Proxy Frame -->
    <iframe class="proxy-frame" id="proxyFrame" style="display:none;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
    <div>Yllx v1.0</div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const proxyFrame = document.getElementById('proxyFrame');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const loader = document.getElementById('loader');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const shortcuts = document.querySelectorAll('.shortcut');

    // Format URL helper
    function processUrl(input) {
      let url = input.trim();
      
      // If no protocol, add https
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        // Check if it looks like a domain
        if (url.includes('.') && !url.includes(' ')) {
          url = 'https://' + url;
        } else {
          // Treat as YouTube search for convenience
          url = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(url);
        }
      }
      return url;
    }

    function navigate(url) {
      url = processUrl(url);
      
      // Show loading
      loader.style.display = 'flex';
      welcomeScreen.style.display = 'none';
      proxyFrame.style.display = 'none';
      statusText.textContent = 'Loading...';
      statusDot.style.background = '#f59e0b';

      // Use Ultraviolet proxy path
      const proxyUrl = '/service/uv/' + encodeURIComponent(url);
      
      // Update UI
      urlInput.value = url;
      
      // Load in iframe
      proxyFrame.src = proxyUrl;
      
      // Hide loader when loaded
      proxyFrame.onload = () => {
        loader.style.display = 'none';
        proxyFrame.style.display = 'block';
        statusText.textContent = 'Connected';
        statusDot.style.background = 'var(--accent)';
      };
      
      // Error handling
      proxyFrame.onerror = () => {
        loader.style.display = 'none';
        statusText.textContent = 'Error';
        statusDot.style.background = '#ef4444';
        alert('Failed to load the page. The site might be blocking proxies.');
      };
    }

    // Event Listeners
    goBtn.addEventListener('click', () => navigate(urlInput.value));
    
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') navigate(urlInput.value);
    });

    shortcuts.forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.getAttribute('data-url')));
    });

    // Handle Back/Forward (basic implementation using history API)
    window.addEventListener('popstate', () => {
      location.reload();
    });
  </script>
</body>
</html>
